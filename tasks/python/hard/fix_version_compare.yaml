id: fix-version-compare
category: fix
difficulty: senior
chunk_size: medium
language: python
title: "Fix bugs in a version-string comparator"
solution_file: solution.py
prompt: |
  ## Ticket: Fix our version comparison function

  ### Description
  `compare_versions` is supposed to compare two dotted numeric version strings
  and return -1, 0, or 1. QA reports two failing cases:
  - `compare_versions("1.0", "1.0.0")` returns -1 but should return 0
    (missing trailing components are treated as zero).
  - `compare_versions("1.9", "1.10")` returns 1 but should return -1
    (components must be compared numerically, not as strings).

  ### Context — the buggy code
  ```python
  def compare_versions(a: str, b: str) -> int:
      """Return -1 if a < b, 0 if equal, 1 if a > b."""
      pa = a.split(".")
      pb = b.split(".")
      for x, y in zip(pa, pb):
          if x < y:
              return -1
          if x > y:
              return 1
      if len(pa) < len(pb):
          return -1
      if len(pa) > len(pb):
          return 1
      return 0
  ```

  ### Requirements
  - Fix both bugs. Keep the signature `compare_versions(a: str, b: str) -> int`.
  - Compare each component numerically.
  - Treat missing trailing components as 0 so `"1.0" == "1.0.0" == "1"`.
  - Return exactly -1, 0, or 1.

  Return the corrected function in solution.py.
test_code: |
  from solution import compare_versions

  def test_equal_simple(): assert compare_versions("1.2.3", "1.2.3") == 0
  def test_trailing_zero(): assert compare_versions("1.0", "1.0.0") == 0
  def test_trailing_zero2(): assert compare_versions("1", "1.0.0") == 0
  def test_numeric_not_lexical(): assert compare_versions("1.9", "1.10") == -1
  def test_numeric_not_lexical2(): assert compare_versions("1.10", "1.9") == 1
  def test_greater(): assert compare_versions("2.0.0", "1.9.9") == 1
  def test_less(): assert compare_versions("1.0.0", "1.0.1") == -1
  def test_big_numbers(): assert compare_versions("1.0.100", "1.0.99") == 1
  def test_diff_length_greater(): assert compare_versions("1.2.1", "1.2") == 1
  def test_diff_length_less(): assert compare_versions("1.2", "1.2.1") == -1
  def test_leading_zeros(): assert compare_versions("1.01", "1.1") == 0
