id: impl-expr-eval
category: implement
difficulty: senior
chunk_size: large
language: python
title: "Implement a recursive-descent arithmetic evaluator"
solution_file: solution.py
prompt: |
  ## Ticket: Implement an arithmetic expression evaluator

  ### Description
  Implement `evaluate(expr: str) -> float` that parses and evaluates an
  arithmetic expression string. No use of `eval`, `exec`, or `ast`.

  ### Requirements
  - Support binary operators `+ - * /` with correct precedence
    (`*` and `/` bind tighter than `+` and `-`), left-associative.
  - Support parentheses for grouping, arbitrarily nested.
  - Support unary minus (e.g. `-5`, `2 * -3`).
  - Support integer and decimal literals (e.g. `3`, `3.5`).
  - Ignore surrounding and internal whitespace.
  - On any malformed input (empty string, unbalanced parens, two adjacent
    numbers, trailing operator, etc.) raise `ValueError`.
  - Do NOT use eval/exec/ast/compile.

  Implement in solution.py. Include all imports.
test_code: |
  import pytest
  from solution import evaluate

  def test_add(): assert evaluate("1+2") == 3
  def test_precedence(): assert evaluate("2+3*4") == 14
  def test_precedence2(): assert evaluate("2*3+4") == 10
  def test_parens(): assert evaluate("(2+3)*4") == 20
  def test_nested(): assert evaluate("((1+2)*(3+4))") == 21
  def test_div(): assert evaluate("10/4") == pytest.approx(2.5)
  def test_left_assoc(): assert evaluate("10-2-3") == 5
  def test_unary(): assert evaluate("-5+3") == -2
  def test_unary_mul(): assert evaluate("2*-3") == -6
  def test_float(): assert evaluate("3.5*2") == pytest.approx(7.0)
  def test_whitespace(): assert evaluate("  1 +  2 ") == 3
  def test_chain(): assert evaluate("2*3*4") == 24

  def test_err_empty():
      with pytest.raises(ValueError): evaluate("")
  def test_err_unbalanced():
      with pytest.raises(ValueError): evaluate("(1+2")
  def test_err_leading_op():
      with pytest.raises(ValueError): evaluate("*5")
  def test_err_trailing_op():
      with pytest.raises(ValueError): evaluate("1+")
