id: ts-impl-merge-intervals
category: implement
difficulty: hard
chunk_size: medium
language: typescript
tier: hard
title: "Merge overlapping intervals"
solution_file: solution.ts
prompt: |
  ## Ticket: mergeIntervals

  ### Description
  Implement `mergeIntervals`.

  ### Requirements
  - Signature: `export function mergeIntervals(intervals: [number, number][]): [number, number][]`
  - Each interval is `[start, end]` with `start <= end`.
  - Return the merged set of non-overlapping intervals, sorted ascending by start.
  - Intervals that touch at an endpoint merge (e.g. `[1, 2]` and `[2, 3]` -> `[1, 3]`).
  - Do not mutate the input. An empty input returns `[]`.

  Implement in solution.ts and export `mergeIntervals`.
test_code: |
  import { describe, it, expect } from 'vitest';
  import { mergeIntervals } from './solution';

  describe('mergeIntervals', () => {
    it('merges overlaps', () => {
      expect(mergeIntervals([[1, 3], [2, 6], [8, 10], [15, 18]]))
        .toEqual([[1, 6], [8, 10], [15, 18]]);
    });
    it('merges touching intervals', () => {
      expect(mergeIntervals([[1, 2], [2, 3]])).toEqual([[1, 3]]);
    });
    it('sorts unsorted input', () => {
      expect(mergeIntervals([[8, 10], [1, 3], [2, 6]])).toEqual([[1, 6], [8, 10]]);
    });
    it('leaves disjoint intervals alone', () => {
      expect(mergeIntervals([[1, 2], [4, 5]])).toEqual([[1, 2], [4, 5]]);
    });
    it('empty input', () => {
      expect(mergeIntervals([])).toEqual([]);
    });
    it('does not mutate input', () => {
      const input: [number, number][] = [[2, 3], [1, 2]];
      mergeIntervals(input);
      expect(input).toEqual([[2, 3], [1, 2]]);
    });
  });
